<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIV Smart Edu - Next Gen</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1; --secondary: #10b981; --bg: #f8fafc; --text: #1e293b;
            --glass: rgba(255, 255, 255, 0.7);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: linear-gradient(135deg, #e0e7ff, #ccfbf1); min-height: 100vh; color: var(--text); }

        /* Header & Nav */
        nav { padding: 1.5rem 5%; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 800; font-size: 1.5rem; color: var(--primary); }
        
        /* Hero */
        .hero { text-align: center; padding: 4rem 5%; }
        h1 { font-size: 3rem; margin-bottom: 1rem; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .pulse-btn { padding: 1rem 2rem; background: var(--primary); color: white; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(99, 102, 241, 0); } }

        /* Card Section */
        .section { padding: 4rem 5%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: var(--glass); backdrop-filter: blur(10px); padding: 2rem; border-radius: 20px; border: 1px solid rgba(255,255,255,0.3); transition: 0.3s; }
        .card:hover { transform: translateY(-10px); }

        /* Quiz & FM */
        .interactive-box { max-width: 700px; margin: auto; background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .option-btn { width: 100%; padding: 1rem; margin: 0.5rem 0; border: 2px solid #e2e8f0; border-radius: 10px; cursor: pointer; text-align: left; background: white; transition: 0.3s; }
        .option-btn:hover { border-color: var(--primary); background: #f5f3ff; }
        .correct { background: #d1fae5 !important; border-color: #059669 !important; }
        .wrong { background: #fee2e2 !important; border-color: #dc2626 !important; }
        .explanation { margin-top: 1rem; padding: 1rem; border-radius: 10px; background: #f1f5f9; display: none; }
        
        .hidden { display: none; }
        .visible { display: block; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">HIV Smart Edu</div>
        <div><button onclick="showPage('home')" class="pulse-btn" style="padding: 0.5rem 1rem; animation: none;">Menu</button></div>
    </nav>

    <div id="pages">
        <!-- Home -->
        <section id="home" class="hero">
            <h1>Edukasi HIV Generasi Baru</h1>
            <p>Paham HIV, Putus Stigma. Belajar lebih seru dengan tantangan interaktif.</p><br>
            <button class="pulse-btn" onclick="showPage('quiz')">Mulai Misi Belajar</button>
        </section>

        <!-- Quiz & Fakta/Mitos Digabung -->
        <section id="quiz" class="section">
            <h2 style="text-align:center; margin-bottom: 2rem;">Tantangan Pengetahuan</h2>
            <div id="game-container" class="interactive-box">
                <!-- Content injected by JS -->
            </div>
        </section>
    </div>

    <script>
        const quizData = [
            { q: "HIV menular lewat jabat tangan atau gigitan nyamuk?", a: "Mitos", exp: "HIV tidak hidup di air liur nyamuk. Penularan hanya via cairan tubuh (darah, sperma, ASI, cairan vagina)." },
            { q: "Apakah HIV bisa dideteksi langsung setelah terpapar?", a: "Mitos", exp: "Ada 'Window Period' (1-3 bulan) di mana virus belum terdeteksi tes meski sudah ada di tubuh." },
            { q: "Konsep U=U (Undetectable = Untransmittable) itu nyata?", a: "Fakta", exp: "Jika pengguna ARV rutin hingga virus tidak terdeteksi di darah, HIV TIDAK menular ke pasangan seks." },
            { q: "HIV menyerang sel apa dalam tubuh?", a: "Sel CD4 (Sistem Imun)", exp: "HIV adalah virus yang secara khusus membajak 'tentara' tubuh kita sendiri yaitu sel CD4." },
            { q: "Bisakah ibu dengan HIV melahirkan bayi sehat?", a: "Fakta", exp: "Bisa! Dengan terapi ARV, risiko penularan ke bayi bisa ditekan hingga mendekati 0%." }
        ];

        let currentIdx = 0;

        function showPage(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function loadGame() {
            const box = document.getElementById('game-container');
            const data = quizData[currentIdx];
            box.innerHTML = `
                <h3>${currentIdx + 1}. ${data.q}</h3>
                <div id="opts">
                    <button class="option-btn" onclick="checkAnswer('Fakta')">Fakta</button>
                    <button class="option-btn" onclick="checkAnswer('Mitos')">Mitos</button>
                </div>
                <div id="exp" class="explanation"></div>
                <button id="next-btn" class="hidden" style="margin-top:1rem;" onclick="next()">Soal Berikutnya</button>
            `;
        }

        function checkAnswer(choice) {
            const data = quizData[currentIdx];
            const expDiv = document.getElementById('exp');
            const btns = document.querySelectorAll('.option-btn');
            
            btns.forEach(b => b.disabled = true);
            
            if(choice === data.a) {
                event.target.classList.add('correct');
                expDiv.innerHTML = "<strong>Benar!</strong> " + data.exp;
            } else {
                event.target.classList.add('wrong');
                expDiv.innerHTML = "<strong>Kurang tepat.</strong> " + data.exp;
            }
            expDiv.classList.add('visible');
            document.getElementById('next-btn').classList.remove('hidden');
        }

        function next() {
            currentIdx++;
            if(currentIdx < quizData.length) loadGame();
            else document.getElementById('game-container').innerHTML = "<h2>Misi Selesai! Kamu hebat!</h2><button class='pulse-btn' onclick='location.reload()'>Ulangi</button>";
        }

        loadGame();
    </script>
</body>
</html>
